<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Night - Host</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="christmas-bg">
        <div class="snow"></div>
        <div class="snow" style="animation-delay: 2s; left: 20%"></div>
        <div class="snow" style="animation-delay: 4s; left: 40%"></div>
        <div class="snow" style="animation-delay: 6s; left: 60%"></div>
        <div class="snow" style="animation-delay: 8s; left: 80%"></div>
    </div>

    <div class="light-string">
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
        <div class="light"></div>
    </div>

    <div id="game-container" class="min-h-screen w-full relative flex flex-col">

        <!-- LANDING -->
        <div id="screen-landing" class="screen h-screen flex flex-col items-center justify-center p-4 text-center z-10">
            <h1 class="text-8xl font-black mb-4 text-gold drop-shadow-lg tracking-tighter"
                style="font-family: 'Cinzel Decorative', cursive;">QUIZ NIGHT</h1>
            <div
                class="bg-black/40 p-6 flex justify-between items-center backdrop-blur-md border-b border-white/10 shadow-lg">
                <div>
                    <h2 class="text-3xl font-black text-gold tracking-tight">QUIZ NIGHT</h2>
                    <span class="text-sm font-bold text-red-400 uppercase tracking-widest">Sala de Espera</span>
                </div>
                <div class="flex items-center gap-8">
                    <div class="text-right">
                        <div class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-1">PIN del Juego</div>
                        <div class="text-5xl font-black text-white font-mono tracking-widest" id="host-game-id">...
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="app.toggleSound()" id="btn-sound"
                            class="bg-white/10 p-3 rounded-full hover:bg-white/20 transition-colors border border-white/20 text-white"></button>
                        <button onclick="app.toggleFullscreen()"
                            class="bg-white/10 p-3 rounded-full hover:bg-white/20 transition-colors border border-white/20 text-white">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex p-8 overflow-hidden gap-8">
                <div class="w-1/3 glass-panel flex flex-col items-center justify-center p-8">
                    <div class="bg-white p-4 rounded-xl shadow-2xl mb-8 rotate-1">
                        <div id="qrcode"></div>
                    </div>
                    <div class="text-center">
                        <p class="text-gold uppercase tracking-widest text-sm font-bold mb-2">Únete en</p>
                        <p class="text-2xl font-black mb-6 text-white">Escanea el QR</p>
                        <div class="bg-black/40 px-8 py-4 rounded-full flex items-center gap-4 border border-white/10">
                            <span class="text-green-400 text-2xl">👥</span>
                            <span id="host-player-count" class="text-4xl font-black text-white">0</span>
                        </div>
                    </div>
                </div>

                <div class="flex-1 glass-panel p-8 relative flex flex-col overflow-hidden">
                    <div id="host-player-list"
                        class="flex-1 grid grid-cols-3 md:grid-cols-4 gap-4 content-start overflow-y-auto pr-2"></div>
                    <div
                        class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black/80 to-transparent flex justify-end pointer-events-none">
                        <button onclick="app.startHostGame()" id="btn-start-game" disabled
                            class="pointer-events-auto btn-primary py-4 px-12 rounded-full text-2xl shadow-xl disabled:opacity-50 disabled:cursor-not-allowed">
                            EMPEZAR ➔
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- GAME -->
        <div id="screen-host-game" class="screen hidden-screen h-screen flex flex-col p-6 fade-in z-10">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-4">
                    <div id="host-q-counter"
                        class="bg-white/10 px-6 py-2 rounded-full border border-white/10 font-bold text-xl text-white">1
                        / 10</div>
                    <div id="host-type-badge"></div>
                </div>
                <div id="host-timer" class="text-7xl font-black font-mono tabular-nums text-white drop-shadow-lg">20
                </div>
                <div
                    class="bg-white/10 px-6 py-2 rounded-full border border-white/10 font-mono text-xl font-bold text-slate-300">
                    PIN: <span id="host-game-pin-small" class="text-white"></span>
                </div>
            </div>

            <div class="flex-1 flex items-center justify-center mb-8">
                <div class="glass-panel p-12 w-full max-w-6xl text-center relative overflow-hidden">
                    <div id="host-q-bar" class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-gold to-red-500">
                    </div>
                    <h2 id="host-q-text"
                        class="text-5xl md:text-6xl font-black leading-tight text-white drop-shadow-md font-heading">
                        Cargando...</h2>
                </div>
            </div>

            <div id="host-options-grid" class="grid grid-cols-2 gap-6 h-1/3 pb-4 transition-opacity duration-500"></div>

            <div id="host-preview-msg" class="fixed bottom-12 left-0 w-full text-center pointer-events-none">
                <div
                    class="inline-block bg-black/80 backdrop-blur px-10 py-5 rounded-full shadow-2xl border border-gold/50">
                    <p id="host-preview-text" class="text-4xl font-black animate-pulse text-gold">LEE ATENTAMENTE</p>
                </div>
            </div>
        </div>

        <!-- LEADERBOARD -->
        <div id="screen-host-leaderboard" class="screen hidden-screen h-screen flex flex-col p-8 fade-in z-10">
            <h2 class="text-6xl font-black text-center mb-8 text-gold drop-shadow-lg tracking-widest font-heading">
                CLASIFICACIÓN</h2>
            <div id="host-leaderboard-list" class="flex-1 max-w-5xl w-full mx-auto space-y-2 overflow-y-auto pr-2">
            </div>
            <div class="flex justify-end mt-4">
                <button onclick="app.nextQuestion()"
                    class="btn-primary py-4 px-10 rounded-full text-2xl flex items-center">
                    SIGUIENTE ➔
                </button>
            </div>
        </div>

        <!-- FINISHED -->
        <div id="screen-host-finished"
            class="screen hidden-screen h-screen flex flex-col items-center justify-center p-4 fade-in z-10">
            <div class="relative mb-8">
                <div class="absolute -top-24 left-1/2 transform -translate-x-1/2 animate-bounce text-gold text-8xl">👑
                </div>
                <h1
                    class="text-8xl font-black text-white tracking-tighter font-heading drop-shadow-[0_0_20px_rgba(255,215,0,0.5)]">
                    ¡GANADOR!</h1>
            </div>
            <div
                class="glass-panel px-24 py-16 rounded-[3rem] shadow-2xl mb-12 transform scale-110 border-4 border-gold bg-gradient-to-b from-white/10 to-transparent">
                <div class="flex flex-col items-center">
                    <div id="winner-avatar" class="text-9xl mb-6 filter drop-shadow-xl animate-bounce">😎</div>
                    <span id="winner-name" class="text-7xl font-black block mb-2 text-center text-white">Nombre</span>
                </div>
            </div>
            <div id="winner-score"
                class="text-6xl font-black text-gold mb-16 bg-black/50 px-12 py-4 rounded-full border border-gold/30">0
                Puntos</div>
            <button onclick="window.location.reload()" class="btn-secondary py-4 px-12 rounded-full text-xl">Jugar de
                Nuevo</button>
        </div>

    </div>
    <script type="module" src="host.js"></script>
</body>

</html>
