<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Night - Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <h2 class="text-2xl font-bold mb-8 text-white">Create Avatar</h2>
    <div id="avatar-preview-container"
        class="w-40 h-40 rounded-full flex items-center justify-center text-7xl shadow-xl border-4 border-white mb-8 transition-colors duration-300 bg-blue-600">
        <span id="avatar-preview-emoji">😎</span>
    </div>

    <div class="w-full max-w-xs mb-6 glass-panel p-4">
        <p class="text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Choose Face</p>
        <div class="flex items-center justify-between">
            <button onclick="app.cycleEmoji(-1)" class="p-3 hover:bg-white/10 rounded-lg text-white text-2xl">◀</button>
            <span id="avatar-emoji-display" class="text-4xl">😎</span>
            <button onclick="app.cycleEmoji(1)" class="p-3 hover:bg-white/10 rounded-lg text-white text-2xl">▶</button>
        </div>
    </div>

    <div class="w-full max-w-xs mb-10 glass-panel p-4">
        <p class="text-xs font-bold text-slate-300 uppercase tracking-wider mb-2">Choose Color</p>
        <div class="flex justify-center gap-2 flex-wrap" id="color-picker"></div>
    </div>

    <button onclick="app.confirmJoin()"
        class="w-full max-w-sm btn-secondary py-4 rounded-xl text-xl shadow-lg">READY!</button>
    </div>

    <!-- LOBBY -->
    <div id="screen-player-lobby"
        class="screen hidden-screen h-screen flex flex-col items-center justify-center p-6 text-center z-10">
        <div class="mb-8 animate-bounce text-green-400 text-6xl">✓</div>
        <h2 class="text-4xl font-black mb-2 text-white">You're In!</h2>
        <p class="text-xl text-slate-300 mb-10">Wait for the host...</p>

        <div class="relative glass-panel p-8 rounded-3xl flex flex-col items-center w-64">
            <button onclick="app.editAvatar()"
                class="absolute top-2 right-2 p-2 bg-white/10 rounded-full hover:bg-white/20 transition-colors text-white"
                title="Edit">✏️</button>
            <div id="player-lobby-avatar"
                class="w-24 h-24 rounded-full flex items-center justify-center text-5xl shadow-lg border-2 border-white mb-4">
                😎</div>
            <p id="player-lobby-name" class="font-bold text-2xl truncate w-full text-white">Name</p>
        </div>
    </div>

    <!-- PREVIEW -->
    <div id="screen-player-preview"
        class="screen hidden-screen h-screen bg-indigo-900 flex flex-col items-center justify-center p-6 text-center z-10">
        <h2 class="text-3xl font-bold mb-8 text-white">Get Ready!</h2>
        <div
            class="w-32 h-32 bg-white/10 rounded-full flex items-center justify-center mb-8 animate-pulse border-4 border-white/20">
            <span class="text-7xl font-black text-white">?</span>
        </div>
        <p class="text-xl text-white">Look at the screen...</p>
    </div>

    <!-- WAIT -->
    <div id="screen-player-wait"
        class="screen hidden-screen h-screen bg-indigo-900 flex flex-col items-center justify-center p-6 text-center z-10">
        <div class="text-white mb-4 animate-spin text-4xl">⏳</div>
        <p class="text-xl font-bold text-white">Reading...</p>
    </div>

    <!-- GAME -->
    <div id="screen-player-game" class="screen hidden-screen h-screen p-4 grid grid-cols-2 grid-rows-2 gap-4 z-10">
        <button onclick="app.submitAnswer(0)"
            class="bg-red-600 rounded-3xl shadow-lg active:scale-95 transition-transform flex items-center justify-center border-b-8 border-red-800 active:border-b-0 active:mt-2">
            <span class="text-6xl text-white drop-shadow-md">▲</span>
        </button>
        <button onclick="app.submitAnswer(1)"
            class="bg-blue-600 rounded-3xl shadow-lg active:scale-95 transition-transform flex items-center justify-center border-b-8 border-blue-800 active:border-b-0 active:mt-2">
            <span class="text-6xl text-white drop-shadow-md">◆</span>
        </button>
        <button onclick="app.submitAnswer(2)"
            class="bg-purple-600 rounded-3xl shadow-lg active:scale-95 transition-transform flex items-center justify-center border-b-8 border-purple-800 active:border-b-0 active:mt-2">
            <span class="text-6xl text-white drop-shadow-md">●</span>
        </button>
        <button onclick="app.submitAnswer(3)"
            class="bg-green-600 rounded-3xl shadow-lg active:scale-95 transition-transform flex items-center justify-center border-b-8 border-green-800 active:border-b-0 active:mt-2">
            <span class="text-6xl text-white drop-shadow-md">■</span>
        </button>
    </div>

    <!-- ANSWERED -->
    <div id="screen-player-answered"
        class="screen hidden-screen h-screen bg-slate-800 flex flex-col items-center justify-center p-6 text-center z-10">
        <div
            class="bg-green-500 w-24 h-24 rounded-full flex items-center justify-center mb-6 shadow-lg animate-pulse text-white text-4xl">
            ✓</div>
        <h2 class="text-3xl font-bold text-white">Answer Sent!</h2>
    </div>

    <!-- RESULT -->
    <div id="screen-player-result"
        class="screen hidden-screen h-screen flex flex-col items-center justify-center p-6 text-center z-10">
        <div class="mb-6 animate-bounce text-white" id="player-result-icon"></div>
        <h2 id="player-result-text" class="text-5xl font-black tracking-tighter text-white drop-shadow-md"></h2>
    </div>

    <!-- LEADERBOARD -->
    <div id="screen-player-leaderboard"
        class="screen hidden-screen h-screen flex flex-col items-center justify-center p-6 text-center transition-colors duration-500 bg-slate-900 z-10">
        <div class="glass-panel p-8 rounded-[2rem] w-full max-w-sm shadow-xl">
            <div class="text-lg font-bold mb-2 uppercase tracking-wider opacity-80 text-white">Rank</div>
            <div id="player-rank" class="text-7xl font-black mb-8 text-gold">?</div>
            <div class="bg-black/20 rounded-2xl p-6 mb-6">
                <div class="text-sm font-bold opacity-80 uppercase mb-1 text-white">Total Score</div>
                <div id="player-score" class="text-4xl font-black text-white">0</div>
            </div>
            <div id="player-feedback-positive" class="hidden">
                <div class="animate-bounce bg-white text-green-600 py-3 px-6 rounded-xl shadow-lg inline-block">
                    <div id="player-points-gained" class="text-3xl font-black">+ 0</div>
                </div>
            </div>
            <div id="player-feedback-negative" class="hidden opacity-60 text-white">
                <div class="text-2xl font-bold">No points</div>
            </div>
        </div>
        <button id="player-btn-exit" onclick="window.location.reload()"
            class="hidden mt-8 bg-white text-slate-900 px-8 py-4 rounded-xl font-bold shadow-lg">Exit</button>
    </div>

    </div>
    <script type="module" src="player.js"></script>
    </body>

</html>
